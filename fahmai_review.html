<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FahMai — Question Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a2f45;
    --border2: #343a52;
    --text: #e2e6f3;
    --text2: #8892b0;
    --text3: #4a5278;
    --accent: #5b7cfa;
    --accent-dim: rgba(91,124,250,0.12);
    --accent-border: rgba(91,124,250,0.35);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.10);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.10);
    --red: #f06060;
    --red-dim: rgba(240,96,96,0.10);
    --choice9: #a78bfa;
    --choice9-dim: rgba(167,139,250,0.10);
    --choice10: #fb923c;
    --choice10-dim: rgba(251,146,60,0.10);
    --font: 'IBM Plex Sans Thai', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  #progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 6px;
  }
  #progress-bar {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }
  #progress-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }

  #q-grid {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    align-content: start;
  }
  #q-grid::-webkit-scrollbar { width: 4px; }
  #q-grid::-webkit-scrollbar-track { background: transparent; }
  #q-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .q-dot {
    aspect-ratio: 1;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text3);
    transition: all 0.15s;
    user-select: none;
  }
  .q-dot:hover { border-color: var(--border2); color: var(--text2); }
  .q-dot.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .q-dot.answered { background: var(--green-dim); border-color: rgba(62,207,142,0.3); color: var(--green); }
  .q-dot.answered.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .q-dot.choice9 { background: var(--choice9-dim); border-color: rgba(167,139,250,0.3); color: var(--choice9); }
  .q-dot.choice10 { background: var(--choice10-dim); border-color: rgba(251,146,60,0.3); color: var(--choice10); }

  #sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .legend {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--text2);
    font-family: var(--mono);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
  }

  /* ── MAIN ── */
  #main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  #main::-webkit-scrollbar { width: 6px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  #q-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #q-id-badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  #q-category-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .cat-product { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
  .cat-policy  { background: var(--amber-dim);  color: var(--amber);  border: 1px solid rgba(245,166,35,0.3); }
  .cat-math    { background: var(--red-dim);     color: var(--red);    border: 1px solid rgba(240,96,96,0.3); }
  .cat-noinfo  { background: var(--choice9-dim); color: var(--choice9);border: 1px solid rgba(167,139,250,0.3); }
  .cat-offtopic{ background: var(--choice10-dim);color: var(--choice10);border: 1px solid rgba(251,146,60,0.3); }

  #nav-btns { margin-left: auto; display: flex; gap: 6px; }
  .nav-btn {
    padding: 5px 14px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  #q-body {
    padding: 28px 28px 0;
    flex: 1;
  }

  #q-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 28px;
    padding: 20px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  #choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }

  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    font-family: var(--font);
    color: var(--text);
  }
  .choice-btn:hover { border-color: var(--border2); background: var(--surface2); }
  .choice-btn.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .choice-btn.c9.selected { background: var(--choice9-dim); border-color: var(--choice9); }
  .choice-btn.c10.selected { background: var(--choice10-dim); border-color: var(--choice10); }

  .choice-num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    min-width: 18px;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .choice-btn.selected .choice-num { color: var(--accent); }
  .choice-btn.c9.selected .choice-num { color: var(--choice9); }
  .choice-btn.c10.selected .choice-num { color: var(--choice10); }

  .choice-text {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text2);
  }
  .choice-btn.selected .choice-text { color: var(--text); }

  .choice-special { opacity: 0.65; }
  .choice-btn:hover .choice-special { opacity: 1; }
  .choice-btn.selected.choice-special { opacity: 1; }

  #q-footer {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #current-answer {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }
  #current-answer span { color: var(--green); font-weight: 600; }
  .clear-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    background: none;
    border: 1px solid rgba(240,96,96,0.25);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { background: var(--red-dim); }
  #export-btn {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    background: var(--green);
    color: #0a1a10;
    border: none;
    padding: 7px 18px;
    border-radius: 5px;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.04em;
  }
  #export-btn:hover { opacity: 0.85; }
  #export-btn:disabled { opacity: 0.4; cursor: default; }
  #export-notes-btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    padding: 7px 14px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #export-notes-btn:hover { background: var(--accent-dim); }

  /* ── IMPORT / FLAG / COMMENT ── */
  #import-btn {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  #import-btn:hover { background: var(--accent-dim); }

  .flag-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    background: none;
    transition: all 0.15s;
  }
  #flag-green {
    border: 1px solid rgba(62,207,142,0.3);
    color: var(--green);
  }
  #flag-green:hover { background: var(--green-dim); }
  #flag-green.flagged { background: var(--green-dim); border-color: var(--green); font-weight: 600; }

  #flag-yellow {
    border: 1px solid rgba(245,166,35,0.3);
    color: var(--amber);
  }
  #flag-yellow:hover { background: var(--amber-dim); }
  #flag-yellow.flagged { background: var(--amber-dim); border-color: var(--amber); font-weight: 600; }

  .q-dot { position: relative; }
  .q-dot.flag-green::after {
    content: '';
    position: absolute;
    top: 2px; right: 2px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--green);
  }
  .q-dot.flag-yellow::after {
    content: '';
    position: absolute;
    top: 2px; right: 2px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--amber);
  }

  #comment-wrap {
    padding: 0 28px 16px;
  }
  #comment-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-family: var(--font);
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.15s;
  }
  #comment-input:focus { border-color: var(--border2); }
  #comment-input::placeholder { color: var(--text3); }

  /* ── JUMP INPUT ── */
  #jump-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  #jump-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
  }
  #jump-input:focus { border-color: var(--accent); }
  #jump-input::placeholder { color: var(--text3); }
  #jump-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  #jump-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>FahMai Review</h1>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="progress-text">0 / 100 answered</div>
  </div>
  <div id="jump-wrap">
    <input id="jump-input" type="number" min="1" max="100" placeholder="Go to Q#">
    <button id="jump-btn" onclick="jumpTo()">Go</button>
  </div>
  <div id="q-grid"></div>
  <div id="sidebar-footer">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3ecf8e"></div>answered</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>→ 9</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div>→ 10</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2a2f45"></div>blank</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3ecf8e;border-radius:50%"></div>green flag</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f5a623;border-radius:50%"></div>yellow flag</div>
    </div>
    <label id="import-btn" title="Import submission.csv (id,answer)">
      <input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(this)">
      Import CSV
    </label>
  </div>
</div>

<div id="main">
  <div id="q-header">
    <div id="q-id-badge">Q001</div>
    <div id="q-category-badge" class="cat-product">product</div>
    <div id="nav-btns">
      <button class="nav-btn" onclick="navigate(-1)">← Prev</button>
      <button class="nav-btn" onclick="navigate(1)">Next →</button>
    </div>
  </div>
  <div id="q-body">
    <div id="q-text"></div>
    <div id="choices-grid"></div>
  </div>
  <div id="comment-wrap">
    <textarea id="comment-input" placeholder="Comment (optional)..." oninput="saveComment(this.value)"></textarea>
  </div>
  <div id="q-footer">
    <div id="current-answer">Answer: <span id="answer-display">—</span></div>
    <button class="clear-btn" onclick="clearAnswer()">Clear</button>
    <button class="flag-btn" id="flag-green" onclick="toggleFlag('green')">Green Flag</button>
    <button class="flag-btn" id="flag-yellow" onclick="toggleFlag('yellow')">Yellow Flag</button>
    <button id="export-btn" onclick="exportCSV()">Export CSV</button>
    <button id="export-notes-btn" onclick="exportNotes()">Export Notes</button>
  </div>
</div>

ราะ SlimBook 14 มีพอร์ต Thunderbolt 4 รองรับ ส่วน Dock AirBook Edition ต้องใช้กับ AirBook เท่านั้น", "9": "ไม่มีข้อมูลนี้ในฐานข้อมูล", "10": "คำถามนี้ไม่เกี่ยวข้องกับฐานข้อมูลสินค้า"}}, {"id": 72, "q": "เฮดโปร X1 กับ X1 SE สเปคต่างกันยังไงบ้างคะ?", "choices": {"1": "สเปคหลักเหมือนกัน ต่างกันที่ X1 SE มี ANC ดีกว่า ตัดเสียงได้ลึกกว่า 5 dB และมีโหมด Adaptive ANC เพิ่มเติม", "2": "X1 SE มีแบตเตอรี่ 40 ชั่วโมงขณะ ANC เปิด ส่วน X1 ได้ 30 ชั่วโมง และ SE รองรับ aptX HD เพิ่มเติมจาก LDAC", "3": "สเปคหลักเหมือนกัน ต่างกันที่ X1 SE แบตเตอรี่ 35 ชั่วโมง (ANC เปิด) ดีกว่า X1 ที่ได้ 30 ชั่วโมง", "4": "X1 SE รองรับ LDAC แต่ X1 ธรรมดาไม่รองรับ รองรับแค่ SBC และ AAC เท่านั้น ทำให้คุณภาพเสียงต่ำกว่า", "5": "X1 SE น้ำหนักเบากว่า X1 เยอะมาก (220 กรัม vs 253 กรัม) ใช้วัสดุคาร์บอนไฟเบอร์แทนอะลูมิเนียม", "6": "สเปคหลักเหมือนกัน ต่างกันที่ X1 SE รองรับ Multipoint 3 อุปกรณ์ ส่วน X1 ได้แค่ 2 อุปกรณ์", "7": "สเปคหลักเหมือนกัน ต่างกันที่ X1 SE ใช้หนังแท้ (Premium Leather) แทน PU และมีสี Lavender Gray เพิ่ม ราคาต่างกัน 500 บาท", "8": "X1 SE ตัดเสียงรบกวนแบบ Adaptive ANC ปรับระดับอัตโนมัติ ส่วน X1 เป็น ANC ธรรมดาที่ปรับได้แค่เปิด/ปิด", "9": "ไม่มีข้อมูลนี้ในฐานข้อมูล", "10": "คำถามนี้ไม่เกี่ยวข้องกับฐานข้อมูลสินค้า"}}, {"id": 73, "q": "soundbar 300 ที่เป็น 3.1ch ยี่ห้ออะไรครับ ตัว SoundPillar 300 กับ SoundBar 300 งงว่าอันไหนเป็นอันไหน", "choices": {"1": "SoundPillar 300 ของ ArcWave เป็น 3.1ch มี center channel ในตัว กำลังขับ 60W RMS ราคา ฿7,490 เชื่อมต่อ HDMI ARC และ Optical", "2": "ทั้งสองรุ่นเป็น 3.1ch เหมือนกัน ต่างกันแค่แบรนด์ คลื่นเสียง (฿7,990) กำลังขับ 80W กับ ArcWave (฿7,490) กำลังขับ 60W", "3": "ทั้งสองรุ่นเป็น 3.0ch เหมือนกัน ไม่มี center channel ทั้งคู่ ต่างกันแค่กำลังขับ 80W vs 60W และราคา ฿7,990 vs ฿7,490", "4": "SoundBar 300 ของ ArcWave เป็น 3.1ch มี center channel กำลังขับ 80W RMS ราคา ฿7,990 เชื่อมต่อ HDMI ARC และ Optical", "5": "SoundPillar 300 เป็น 5.1ch มาพร้อม wireless subwoofer แยก ราคา ฿7,490 ส่วน SoundBar 300 เป็น 3.1ch ในตัว ราคา ฿7,990", "6": "SoundBar 300 ของคลื่นเสียง function getCat(id) {
  if (CATEGORIES[id] === 'noinfo') return ['cat-noinfo','→ 9'];
  if (CATEGORIES[id] === 'offtopic') return ['cat-offtopic','→ 10'];
  if (CATEGORIES[id] === 'math') return ['cat-math','calc'];
  const q = QUESTIONS.find(q=>q.id===id);
  const text = q ? q.q : '';
  if (text.includes('นโยบาย') || text.includes('คืน') || text.includes('ยกเลิก') ||
      text.includes('ส่ง') || text.includes('ประกัน') || text.includes('จัดส่ง'))
    return ['cat-policy','policy'];
  return ['cat-product','product'];
}

let current = 1;
const answers = {};
const flags = {};
const comments = {};

// Build sidebar dots
const grid = document.getElementById('q-grid');
QUESTIONS.forEach(q => {
  const dot = document.createElement('div');
  dot.className = 'q-dot';
  dot.textContent = q.id;
  dot.id = 'dot-' + q.id;
  dot.onclick = () => goTo(q.id);
  grid.appendChild(dot);
});

function goTo(id) {
  current = id;
  render();
  // Scroll dot into view
  const dot = document.getElementById('dot-' + id);
  if (dot) dot.scrollIntoView({ block: 'nearest' });
}

function navigate(dir) {
  const idx = QUESTIONS.findIndex(q => q.id === current);
  const next = QUESTIONS[idx + dir];
  if (next) goTo(next.id);
}

function jumpTo() {
  const val = parseInt(document.getElementById('jump-input').value);
  if (val >= 1 && val <= 100) { goTo(val); document.getElementById('jump-input').value = ''; }
}
document.getElementById('jump-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') jumpTo();
});

function selectAnswer(num) {
  answers[current] = num;
  updateDot(current);
  updateProgress();
  render();
}

function clearAnswer() {
  delete answers[current];
  updateDot(current);
  updateProgress();
  render();
}

function updateDot(id) {
  const dot = document.getElementById('dot-' + id);
  const ans = answers[id];
  dot.className = 'q-dot';
  if (id === current) dot.classList.add('active');
  if (ans !== undefined) {
    if (ans == 9) dot.classList.add('choice9');
    else if (ans == 10) dot.classList.add('choice10');
    else dot.classList.add('answered');
  }
  if (flags[id] === 'green') dot.classList.add('flag-green');
  else if (flags[id] === 'yellow') dot.classList.add('flag-yellow');
}

function toggleFlag(color) {
  if (flags[current] === color) delete flags[current];
  else flags[current] = color;
  updateDot(current);
  renderFlagBtns();
}

function renderFlagBtns() {
  const f = flags[current];
  const gBtn = document.getElementById('flag-green');
  const yBtn = document.getElementById('flag-yellow');
  gBtn.textContent = f === 'green' ? 'Green ✓' : 'Green Flag';
  gBtn.classList.toggle('flagged', f === 'green');
  yBtn.textContent = f === 'yellow' ? 'Yellow ✓' : 'Yellow Flag';
  yBtn.classList.toggle('flagged', f === 'yellow');
}

function saveComment(val) {
  if (val.trim()) comments[current] = val;
  else delete comments[current];
}

function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.trim().split('\n');
    let imported = 0;
    lines.forEach(line => {
      const [id, ans] = line.split(',');
      const idNum = parseInt(id);
      const ansNum = parseInt(ans);
      if (!isNaN(idNum) && !isNaN(ansNum)) {
        answers[idNum] = ansNum;
        imported++;
      }
    });
    QUESTIONS.forEach(q => updateDot(q.id));
    updateProgress();
    render();
    alert('Imported ' + imported + ' answers.');
  };
  reader.readAsText(file);
  input.value = '';
}

function updateProgress() {
  const count = Object.keys(answers).length;
  document.getElementById('progress-text').textContent = count + ' / 100 answered';
  document.getElementById('progress-bar').style.width = (count) + '%';
}

function render() {
  const q = QUESTIONS.find(q => q.id === current);
  if (!q) return;

  // Update all dots (active state changes)
  QUESTIONS.forEach(q => updateDot(q.id));

  // Header
  document.getElementById('q-id-badge').textContent = 'Q' + String(q.id).padStart(3,'0');
  const [catClass, catLabel] = getCat(q.id);
  const badge = document.getElementById('q-category-badge');
  badge.className = 'q-category-badge ' + catClass;
  badge.textContent = catLabel;

  // Question text
  document.getElementById('q-text').textContent = q.q;

  // Choices
  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  Object.entries(q.choices).forEach(([num, text]) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    if (num == 9 || num == 10) btn.classList.add('choice-special');
    if (num == 9) btn.classList.add('c9');
    if (num == 10) btn.classList.add('c10');
    if (answers[current] == num) btn.classList.add('selected');

    // Full width for long choices or 9/10
    if (num == 9 || num == 10 || text.length > 60) {
      btn.style.gridColumn = '1 / -1';
    }

    btn.innerHTML = '<span class="choice-num">' + num + '</span><span class="choice-text">' + text + '</span>';
    btn.onclick = () => selectAnswer(parseInt(num));
    grid.appendChild(btn);
  });

  // Footer answer display
  const ans = answers[current];
  const display = document.getElementById('answer-display');
  if (ans !== undefined) {
    display.textContent = ans + ' — ' + (q.choices[ans] || '');
    display.style.color = ans == 9 ? '#a78bfa' : ans == 10 ? '#fb923c' : '#3ecf8e';
  } else {
    display.textContent = '—';
    display.style.color = '#8892b0';
  }

  // Flag + comment sync
  renderFlagBtns();
  document.getElementById('comment-input').value = comments[current] || '';

  // Export btn state
  document.getElementById('export-btn').textContent =
    'Export CSV (' + Object.keys(answers).length + ')';
}

function exportCSV() {
  let csv = 'id,answer\n';
  QUESTIONS.forEach(q => {
    const ans = answers[q.id];
    csv += q.id + ',' + (ans !== undefined ? ans : '') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'submission.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function exportNotes() {
  const rows = QUESTIONS
    .filter(q => flags[q.id] || comments[q.id])
    .map(q => {
      const ans = answers[q.id] !== undefined ? answers[q.id] : '';
      const flag = flags[q.id] || '';
      const note = (comments[q.id] || '').replace(/"/g, '""');
      return q.id + ',' + ans + ',' + flag + ',"' + note + '"';
    });
  if (!rows.length) { alert('No flags or comments to export.'); return; }
  const csv = 'id,answer,flag,comment\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'notes.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const key = e.key;
  if (key === 'ArrowRight' || key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (key === 'ArrowLeft'  || key === 'ArrowUp')   { e.preventDefault(); navigate(-1); }
  if (key >= '1' && key <= '9') selectAnswer(parseInt(key));
  if (key === '0') selectAnswer(10);
  if (key === 'Backspace' || key === 'Delete') clearAnswer();
});

// Init
render();
updateProgress();
</script>
</body>
</html>
